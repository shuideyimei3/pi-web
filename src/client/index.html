<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PI WEB</title>
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        color-scheme: dark;
        /* ── Canvas ── */
        --pi-bg: #12141a;
        --pi-surface: #181a22;
        --pi-surface-hover: #21262d;
        --pi-terminal-bg: #05070a;
        --pi-terminal-text: #e6edf3;
        --pi-border: rgba(255, 255, 255, 0.08);
        --pi-border-muted: rgba(255, 255, 255, 0.05);
        /* ── Text ── */
        --pi-text: rgba(255, 255, 255, 0.95);
        --pi-text-secondary: rgba(255, 255, 255, 0.65);
        --pi-text-bright: #f0f6fc;
        --pi-muted: rgba(255, 255, 255, 0.38);
        --pi-dim: rgba(255, 255, 255, 0.28);
        /* ── Accent / Reference ── */
        --pi-accent: #8bb2ff;
        --pi-accent-border: #2f81f7;
        --pi-accent-ref: #e49ec4;
        --pi-accent-ref-bg: rgba(240, 180, 219, 0.08);
        --pi-selection-bg: #0d2847;
        /* ── Semantic ── */
        --pi-success: #7fd1a0;
        --pi-success-border: #238636;
        --pi-success-bg: rgba(127, 209, 160, 0.08);
        --pi-success-surface: #0f2a16;
        --pi-success-ring: #3fb95055;
        --pi-warning: #eeb265;
        --pi-warning-border: #6e5200;
        --pi-warning-surface: rgba(238, 178, 101, 0.08);
        --pi-danger: #f87b7b;
        --pi-danger-bg: rgba(248, 123, 123, 0.08);
        --pi-purple: #d2a8ff;
        --pi-purple-border: #a371f7;
        --pi-purple-surface: #21132f;
        /* ── Running (electric blue) ── */
        --pi-running: #8bb2ff;
        --pi-running-bg: rgba(139, 178, 255, 0.08);
        /* ── Glass ── */
        --pi-glass-bg: rgba(255, 255, 255, 0.035);
        --pi-glass-border: rgba(255, 255, 255, 0.08);
        --pi-glass-highlight: rgba(255, 255, 255, 0.06);
        --pi-glass-blur: blur(20px) saturate(140%);
        /* ── Solid core (no backdrop-filter) ── */
        --pi-solid-bg: rgba(7, 8, 11, 0.45);
        --pi-solid-bg-strong: rgba(7, 8, 11, 0.72);
        /* ── Overlay / Shadow ── */
        --pi-overlay: #0008;
        --pi-shadow-soft: #0006;
        --pi-shadow: #0008;
        --pi-shadow-strong: #000b;
        --pi-bg-overlay-soft: #12141add;
        --pi-bg-overlay: #12141ae6;
        --pi-success-bg-overlay: #0f1b12ee;
        --pi-terminal-selection: #264f78;
      }
      html, body { margin: 0; height: 100%; overflow: hidden; color: var(--pi-text); }
      body {
        min-height: 100dvh;
        background: var(--pi-bg);
        background-image: radial-gradient(circle at top center, rgba(240, 180, 219, 0.04) 0%, rgba(154, 183, 255, 0.01) 50%, transparent 80%);
      }
      /* ── Global scrollbars ── */
      * { scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.08) transparent; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.18); }
      /* ── Running pulse keyframe ── */
      @keyframes codex-pulse {
        0%, 100% { opacity: .5; }
        50% { opacity: 1; }
      }
      @keyframes codex-breathe {
        0%, 100% { box-shadow: 0 0 0 0 rgba(139, 178, 255, 0); }
        50% { box-shadow: 0 0 8px 2px rgba(139, 178, 255, 0.25); }
      }
    </style>
  </head>
  <body>
    <pi-web-app></pi-web-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
